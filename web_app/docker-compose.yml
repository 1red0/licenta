version: '3'

services:

  php-apache:
    container_name: php-node-container
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 8000:80
    networks:
      - app-network

  db:
    image: mysql:latest
    container_name: db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USERNAME: root
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_PASSWORD: admin
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
